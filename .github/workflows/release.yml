name: Release zip on tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Version Consistency
        run: |
          $TAG_VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $MANIFEST = Get-Content extension\manifest.json | ConvertFrom-Json
          $MANIFEST_VERSION = $MANIFEST.version_name
          
          Write-Host "Tag version: $TAG_VERSION"
          Write-Host "Manifest version: $MANIFEST_VERSION"
          
          if ($TAG_VERSION -ne $MANIFEST_VERSION) {
            Write-Error "VERSION MISMATCH! Tag: v$TAG_VERSION, Manifest: $MANIFEST_VERSION"
            Write-Error "Please update extension/manifest.json to match the tag version"
            exit 1
          }
          
          Write-Host "[OK] Version consistency check passed: $TAG_VERSION"
        shell: pwsh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        env:
          PYINSTALLER_COMPILE_BOOTLOADER: 1
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install --no-binary pyinstaller pyinstaller

      - name: Update Version Info
        run: |
          $TAG_VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $VERSION_PARTS = $TAG_VERSION -replace '-.*$', '' -split '\.'
          $MAJOR = $VERSION_PARTS[0]
          $MINOR = $VERSION_PARTS[1]
          $PATCH = $VERSION_PARTS[2]
          
          Write-Host "Updating version-info.txt with version: $TAG_VERSION"
          
          $content = Get-Content version-info.txt -Raw
          $content = $content -replace "filevers=\(.*?\)", "filevers=($MAJOR, $MINOR, $PATCH, 0)"
          $content = $content -replace "prodvers=\(.*?\)", "prodvers=($MAJOR, $MINOR, $PATCH, 0)"
          $content = $content -replace "StringStruct\(u'FileVersion', u'.*?'\)", "StringStruct(u'FileVersion', u'$TAG_VERSION')"
          $content = $content -replace "StringStruct\(u'ProductVersion', u'.*?'\)", "StringStruct(u'ProductVersion', u'$TAG_VERSION')"
          
          Set-Content version-info.txt -Value $content
          
          Write-Host "[OK] version-info.txt updated"
        shell: pwsh

      - name: Build Executable
        run: |
          python -c "from PIL import Image; img = Image.open('extension/img/icon-128.png'); img.save('extension/img/icon.ico', format='ICO')"
          python -c "import certifi; print('Certifi CA bundle:', certifi.where())"
          $cert_path = python -c "import certifi, os; print(os.path.dirname(certifi.where()))"
          Write-Host "Certifi path: $cert_path"
          pyinstaller --name "PoB-Injector" --onefile --noconsole --icon "extension\img\icon.ico" --version-file "version-info.txt" --hidden-import=idna --hidden-import=charset_normalizer --hidden-import=certifi --hidden-import=urllib3 --hidden-import=encodings.idna --add-data "${cert_path};certifi" --add-data "server\pob_wrapper\data;pob_wrapper\data" --add-data "server\pob_wrapper\data\commands.lua;pob_wrapper\data" --add-data "server\pob_wrapper\data\cli.lua;pob_wrapper\data" --add-data "server\pob_wrapper\data\mockui.lua;pob_wrapper\data" --add-data "server\pob_wrapper\data\pobinterface.lua;pob_wrapper\data" --add-data "server\pob_wrapper\data\inspect.lua;pob_wrapper\data" --add-data "server\pob_wrapper\data\dkjson.lua;pob_wrapper\data" --add-data "server\pob_wrapper\data\luajit.exe;pob_wrapper\data" --add-data "server\pob_wrapper\data\lua51.dll;pob_wrapper\data" --add-data "extension\img;extension\img" server\tray.py
        shell: pwsh

      - name: List Bundled Data (diagnostics)
        run: |
          echo "=== Files in server/pob_wrapper/data ==="
          Get-ChildItem -Recurse server/pob_wrapper/data
        shell: pwsh

      - name: Package Release
        run: |
          # Use tag version for naming (already validated to match manifest)
          $TAG_VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $ZIP_NAME = "PoB_Injector_Release_v$TAG_VERSION.zip"
          
          Write-Host "Creating release package: $ZIP_NAME"
          
          New-Item -ItemType Directory -Force -Path dist_temp\PoB-Injector
          Copy-Item dist\PoB-Injector.exe -Destination dist_temp\PoB-Injector\
          Copy-Item extension -Destination dist_temp\PoB-Injector\extension -Recurse
          Copy-Item README.md -Destination dist_temp\PoB-Injector\
          
          Compress-Archive -Path dist_temp\PoB-Injector -DestinationPath dist\$ZIP_NAME
          
          Write-Host "[OK] Release package created: $ZIP_NAME"
        shell: powershell

      - name: Build UserScript
        run: python tools/build_userscript.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: dist

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: dist

      - name: Detect Release Type
        id: release_type
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -beta|-rc|-alpha ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release: $TAG"
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release: $TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          files: |
            dist/*.zip
            dist/pob-injector.user.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
